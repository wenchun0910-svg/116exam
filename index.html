<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考試時程表 - 黑板粉筆風</title>
  
  <!-- 引入 Google Fonts: Klee One -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">

  <!-- 引入 Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Phosphor Icons (圖示庫) -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --chalk-white: #f8fafc;
      --chalk-yellow: #fef08a;
      --chalk-red: #fca5a5;
      --chalk-blue: #93c5fd;
      --chalk-green: #86efac;
      --chalk-purple: #d8b4fe;
      --board-bg: #2a3431; 
    }
    
    body { 
      font-family: 'Klee One', cursive, sans-serif; 
      background-color: var(--board-bg);
      color: var(--chalk-white);
    }
    
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
    
    .chalkboard-bg {
      background-color: #26302c;
      background-image: 
        radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 32px 32px;
      background-position: 0 0, 16px 16px;
    }

    .chalk-text { text-shadow: 0px 0px 3px rgba(255, 255, 255, 0.4), 0px 0px 8px rgba(255, 255, 255, 0.1); }
    .chalk-text-yellow { color: var(--chalk-yellow); text-shadow: 0px 0px 4px rgba(254, 240, 138, 0.5); }
    .chalk-text-red { color: var(--chalk-red); text-shadow: 0px 0px 4px rgba(252, 165, 165, 0.5); }

    .chalk-box {
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      background: rgba(255,255,255,0.02);
    }
    .chalk-box:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.9);
    }
    .chalk-box-active {
      border: 3px solid var(--chalk-yellow);
      border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;
      background: rgba(254, 240, 138, 0.05);
    }

    .wooden-ledge {
      background: linear-gradient(to bottom, #bd8349, #7a4f27);
      border-top: 2px solid #e1b483;
      box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
      position: relative;
    }
    .chalk-piece {
      position: absolute;
      bottom: 6px;
      width: 45px;
      height: 12px;
      border-radius: 3px;
      box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2), 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .chalk-input {
      background: rgba(0,0,0,0.2);
      border: none;
      border-bottom: 2px dashed rgba(255,255,255,0.5);
      color: var(--chalk-white);
      font-family: 'Klee One', cursive;
    }
    .chalk-input:focus {
      outline: none;
      border-bottom-color: var(--chalk-yellow);
      background: rgba(0,0,0,0.4);
    }
    ::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.7;
      cursor: pointer;
    }
  </style>
</head>
<body class="antialiased overflow-hidden selection:bg-[#fef08a] selection:text-black chalkboard-bg h-screen flex flex-col relative">

  <button onclick="openSettings()" class="absolute top-6 right-6 md:top-8 md:right-8 p-3 text-white/60 hover:text-white transition-colors duration-300 z-20 flex items-center justify-center rounded-full hover:bg-white/10" title="系統管理">
    <i class="ph ph-gear-six text-4xl chalk-text"></i>
  </button>

  <div class="flex-1 overflow-y-auto w-full flex flex-col">
    <div class="w-full flex flex-col justify-center items-center pt-8 md:pt-12 pb-4 shrink-0">
      <div id="clock-display" class="font-bold tracking-[0.1em] tabular-nums text-center chalk-text" style="font-size: clamp(5rem, 15vw, 15rem); line-height: 1;">
        --:--:--
      </div>
      <div id="notes-display" class="text-xl md:text-3xl mt-4 tracking-widest chalk-text-yellow min-h-[3rem] px-6 text-center max-w-4xl leading-relaxed">
      </div>
    </div>

    <div class="w-full max-w-[1400px] mx-auto px-6 pt-4 flex-1 flex flex-col items-center">
      <div id="schedule-container" class="flex flex-row flex-wrap justify-center items-stretch gap-6 w-full">
      </div>
      <div class="w-full h-48 md:h-64 flex-shrink-0"></div>
    </div>
  </div>

  <div id="countdown-container" class="fixed bottom-16 md:bottom-20 right-6 md:right-10 z-30 hidden transition-all duration-500 chalk-box p-6 bg-[#26302c]/90 backdrop-blur-md shadow-[0_12px_40px_rgba(0,0,0,0.6)] transform translate-y-0">
    <div class="text-[var(--chalk-red)] text-sm md:text-lg font-bold tracking-[0.2em] mb-2 flex items-center gap-2">
      <i class="ph-fill ph-timer animate-pulse"></i> 本節剩餘時間
    </div>
    <div id="countdown-display" class="text-6xl md:text-8xl font-mono chalk-text-red tabular-nums text-center font-bold tracking-widest leading-none">
      --:--
    </div>
  </div>
  
  <div class="wooden-ledge fixed bottom-0 left-0 w-full h-5 md:h-8 z-40">
    <div class="chalk-piece bg-[#fca5a5] left-[10%] rotate-[-15deg]"></div>
    <div class="chalk-piece bg-[#f8fafc] left-[15%] rotate-[5deg]"></div>
    <div class="chalk-piece bg-[#86efac] left-[45%] md:left-[50%] rotate-[20deg]"></div>
    <div class="chalk-piece bg-[#93c5fd] right-[30%] rotate-[-10deg]"></div>
    <div class="chalk-piece bg-[#fef08a] right-[25%] rotate-[12deg]"></div>
    <div class="chalk-piece bg-[#d8b4fe] right-[5%] rotate-[-5deg]"></div>
  </div>

  <div id="settings-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm justify-center items-center z-50 p-4 hidden transition-opacity duration-300">
    <div class="w-full max-w-4xl flex flex-col overflow-hidden max-h-[90vh] shadow-2xl animate-[fadeIn_0.2s_ease-out] rounded-xl border-[12px] border-[#8b5a2b] relative chalkboard-bg">
        
        <div class="p-5 md:p-6 flex justify-between items-center shrink-0 border-b-2 border-white/20 bg-black/20">
          <h3 class="text-2xl font-bold flex items-center gap-3 tracking-widest chalk-text">
            <i class="ph ph-chalkboard-teacher text-3xl"></i> 系統管理與考程設定
          </h3>
          <button onclick="closeSettings()" class="p-2 text-white/60 hover:text-white transition-colors">
            <i class="ph ph-x text-2xl"></i>
          </button>
        </div>

        <div class="p-6 md:p-8 overflow-y-auto flex-1 flex flex-col md:flex-row gap-8 min-h-0">
          
          <!-- 左欄：全局設定 -->
          <div class="w-full md:w-5/12 flex flex-col gap-6">
            <div class="chalk-box p-6 flex-1">
              <h4 class="text-lg font-bold text-[var(--chalk-yellow)] tracking-[0.2em] mb-6 flex items-center gap-2 border-b-2 border-white/20 pb-3">
                <i class="ph ph-sliders-horizontal"></i> 畫面顯示設定
              </h4>
              
              <div class="space-y-6">
                <label class="flex items-center gap-4 cursor-pointer group">
                  <input type="checkbox" id="setting-countdown" onchange="autoSaveGlobalSettings()" class="w-6 h-6 rounded bg-black/20 border-white/50 text-[var(--chalk-yellow)] focus:ring-[var(--chalk-yellow)] cursor-pointer">
                  <span class="text-xl chalk-text tracking-widest group-hover:text-[var(--chalk-yellow)] transition-colors">啟用右下方倒數計時</span>
                </label>

                <div class="pt-2">
                  <label class="block text-xl font-bold text-white/90 mb-3 tracking-widest chalk-text flex items-center gap-2">
                    <i class="ph ph-chat-text"></i> 老師的小叮嚀
                  </label>
                  <textarea id="setting-notes" rows="3" onchange="autoSaveGlobalSettings()" placeholder="例如：請保持安靜，仔細檢查試卷！" class="w-full p-4 chalk-input text-xl resize-none rounded bg-black/20"></textarea>
                </div>
              </div>
            </div>
          </div>

          <!-- 右欄：考程編輯 -->
          <div class="w-full md:w-7/12 flex flex-col">
            <h4 class="text-lg font-bold text-white/80 tracking-[0.2em] mb-4 flex items-center gap-2 border-l-4 border-white/60 pl-3">
              黑板上的考程
            </h4>
            
            <!-- 【已優化】防呆排版的新增欄位 (採用 Grid，防止按鈕掉出或無法點擊) -->
            <div class="p-5 chalk-box mb-6 grid grid-cols-2 md:flex md:flex-wrap gap-4 items-end bg-white/5">
              <div class="col-span-2 md:flex-1 md:min-w-[100px]">
                <label class="block text-sm font-bold text-white/70 mb-2 tracking-widest">科目名稱</label>
                <input type="text" id="new-subject" placeholder="例：國文" class="w-full p-2 chalk-input text-lg" />
              </div>
              <div class="col-span-1 md:w-24 lg:w-28">
                <label class="block text-sm font-bold text-white/70 mb-2 tracking-widest">開始</label>
                <input type="time" id="new-start" class="w-full p-2 chalk-input text-lg" />
              </div>
              <div class="col-span-1 md:w-24 lg:w-28">
                <label class="block text-sm font-bold text-white/70 mb-2 tracking-widest">結束</label>
                <input type="time" id="new-end" class="w-full p-2 chalk-input text-lg" />
              </div>
              <button id="btn-submit-item" type="button" onclick="addEditingItem()" class="col-span-2 border-2 border-[var(--chalk-green)] text-[var(--chalk-green)] hover:bg-[var(--chalk-green)] hover:text-black p-2 flex items-center gap-1 font-bold transition-all w-full md:w-auto justify-center tracking-widest rounded shadow-sm">
                <i id="submit-icon" class="ph ph-plus text-xl"></i> <span id="submit-text">新增</span>
              </button>
            </div>

            <!-- 目前清單 -->
            <div id="editing-list" class="space-y-3 overflow-y-auto max-h-[30vh] pr-2">
            </div>
          </div>
        </div>

        <!-- Modal 底部按鈕 -->
        <div class="p-5 flex justify-end gap-4 shrink-0 border-t-2 border-white/20 bg-black/30">
          <button onclick="closeSettings()" class="px-6 py-3 font-bold bg-white/10 text-white/90 hover:text-white border-2 border-white hover:bg-white hover:text-black rounded-lg transition-all tracking-widest text-lg">
            關閉視窗 (自動儲存)
          </button>
        </div>

    </div>
  </div>

  <script>
    const defaultData = {
      schedule: [
        { id: '1', subject: '國文', startTime: '08:10', endTime: '09:30' },
        { id: '2', subject: '英文', startTime: '09:50', endTime: '11:10' },
        { id: '3', subject: '數學', startTime: '11:30', endTime: '12:50' },
      ],
      settings: { showCountdown: true, teacherNotes: '各位同學，考試加油！細心作答喔！' }
    };
    
    let appData = JSON.parse(JSON.stringify(defaultData));
    
    try {
      const savedData = localStorage.getItem('boardAppData');
      if (savedData) appData = JSON.parse(savedData);
    } catch (e) {
      console.error('無法讀取本地儲存資料', e);
    }
    
    let editingSchedule = [];
    let activeExamId = null;
    let currentEditId = null; 

    const formatTime = (date) => {
      const h = String(date.getHours()).padStart(2, '0');
      const m = String(date.getMinutes()).padStart(2, '0');
      const s = String(date.getSeconds()).padStart(2, '0');
      return `${h}:${m}:${s}`;
    };

    const isCurrentExam = (start, end, timeObj) => {
      const currentMinutes = timeObj.getHours() * 60 + timeObj.getMinutes();
      const [startH, startM] = start.split(':').map(Number);
      const [endH, endM] = end.split(':').map(Number);
      const startTotal = startH * 60 + startM;
      const endTotal = endH * 60 + endM;
      return currentMinutes >= startTotal && currentMinutes <= endTotal;
    };

    function renderSchedule() {
      const container = document.getElementById('schedule-container');
      
      if (appData.schedule.length === 0) {
        container.innerHTML = `
          <div class="text-center text-white/50 mt-16 flex flex-col items-center w-full">
            <i class="ph ph-wind text-6xl mb-4 opacity-50"></i>
            <p class="tracking-widest chalk-text text-xl">黑板上空空如也，請點擊右上角新增考程</p>
          </div>
        `;
        return;
      }

      container.innerHTML = appData.schedule.map(exam => {
        const isActive = exam.id === activeExamId;
        return `
          <div class="p-6 md:p-8 transition-all duration-500 relative ${isActive ? 'chalk-box-active scale-105 shadow-[0_0_20px_rgba(254,240,138,0.15)] z-10' : 'chalk-box opacity-80 hover:opacity-100'} flex-1 min-w-[280px] max-w-[380px] flex-shrink-0 group">
            
            <div class="absolute top-4 right-4 flex gap-3 z-20">
              <button onclick="editFromMain('${exam.id}')" class="text-white/60 hover:text-[var(--chalk-yellow)] transition-colors bg-[#26302c]/50 rounded-full p-1.5" title="修改">
                <i class="ph ph-pencil-simple text-2xl md:text-3xl"></i>
              </button>
              <button onclick="deleteFromMain('${exam.id}')" class="text-white/60 hover:text-[var(--chalk-red)] transition-colors bg-[#26302c]/50 rounded-full p-1.5" title="擦除">
                <i class="ph ph-eraser text-2xl md:text-3xl"></i>
              </button>
            </div>

            <div class="flex flex-col gap-2 h-full justify-center pt-2">
              <div class="flex justify-between items-center mb-1">
                <span class="text-4xl md:text-5xl font-bold tracking-widest leading-none pr-20 ${isActive ? 'chalk-text-yellow' : 'chalk-text'}">
                  ${exam.subject}
                </span>
                ${isActive ? `<span class="absolute -top-4 -left-4 text-[var(--chalk-yellow)] border-2 border-[var(--chalk-yellow)] bg-[#26302c] text-sm font-bold px-4 py-1.5 tracking-[0.2em] rounded-full animate-pulse whitespace-nowrap shadow-lg">進行中</span>` : ''}
              </div>
              
              <div class="flex items-center gap-5 mt-6">
                <i class="ph ${isActive ? 'ph-hourglass-high text-[var(--chalk-yellow)] animate-pulse' : 'ph-clock text-white/50'} text-5xl"></i>
                <div class="flex flex-col border-l-2 ${isActive ? 'border-[var(--chalk-yellow)]' : 'border-white/30'} pl-5 py-1 gap-3">
                  <span class="tracking-[0.1em] font-mono text-3xl md:text-4xl leading-none ${isActive ? 'chalk-text-yellow' : 'chalk-text'}">${exam.startTime}</span>
                  <span class="tracking-[0.1em] font-mono text-3xl md:text-4xl leading-none ${isActive ? 'chalk-text-yellow' : 'chalk-text'}">${exam.endTime}</span>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderEditingSchedule() {
      const listContainer = document.getElementById('editing-list');
      
      if (editingSchedule.length === 0) {
        listContainer.innerHTML = `<p class="text-center text-white/50 py-6 tracking-widest">無考程項目</p>`;
        return;
      }

      listContainer.innerHTML = editingSchedule.map(item => `
        <div class="flex justify-between items-center p-3 chalk-box bg-white/5">
          <div class="flex items-center gap-3 flex-wrap flex-1">
            <span class="text-xl font-bold w-full md:w-20 chalk-text tracking-widest">${item.subject}</span>
            <span class="text-white/80 px-3 py-1 font-mono text-lg tracking-widest border-l-2 border-white/30">
              ${item.startTime} - ${item.endTime}
            </span>
          </div>
          <div class="flex items-center gap-1 shrink-0">
            <button onclick="editEditingItem('${item.id}')" class="text-white/50 hover:text-[var(--chalk-yellow)] p-2 transition-colors">
              <i class="ph ph-pencil-simple text-2xl"></i>
            </button>
            <button onclick="removeEditingItem('${item.id}')" class="text-white/50 hover:text-[var(--chalk-red)] p-2 transition-colors">
              <i class="ph ph-eraser text-2xl"></i>
            </button>
          </div>
        </div>
      `).join('');
    }

    function renderNotes() {
      document.getElementById('notes-display').textContent = appData.settings.teacherNotes;
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('clock-display').textContent = formatTime(now);

      let newActiveExam = null;
      for (const exam of appData.schedule) {
        if (isCurrentExam(exam.startTime, exam.endTime, now)) {
          newActiveExam = exam;
          break;
        }
      }

      if ((newActiveExam ? newActiveExam.id : null) !== activeExamId) {
        activeExamId = newActiveExam ? newActiveExam.id : null;
        renderSchedule();
      }

      const countdownContainer = document.getElementById('countdown-container');
      if (appData.settings.showCountdown && newActiveExam) {
        countdownContainer.classList.remove('translate-y-[150%]', 'opacity-0', 'hidden');
        countdownContainer.classList.add('translate-y-0', 'opacity-100');
        
        const [endH, endM] = newActiveExam.endTime.split(':').map(Number);
        const endDate = new Date();
        endDate.setHours(endH, endM, 0, 0);
        
        let diffSeconds = Math.floor((endDate - now) / 1000);
        if (diffSeconds < 0) diffSeconds = 0; 
        
        const m = String(Math.floor(diffSeconds / 60)).padStart(2, '0');
        const s = String(diffSeconds % 60).padStart(2, '0');
        document.getElementById('countdown-display').textContent = `${m}:${s}`;
      } else {
        countdownContainer.classList.remove('translate-y-0', 'opacity-100');
        countdownContainer.classList.add('translate-y-[150%]', 'opacity-0');
        setTimeout(() => {
          if (!appData.settings.showCountdown || !newActiveExam) countdownContainer.classList.add('hidden');
        }, 500); 
      }
    }

    // --- 互動邏輯與即時儲存 ---

    function autoSaveGlobalSettings() {
      appData.settings.showCountdown = document.getElementById('setting-countdown').checked;
      appData.settings.teacherNotes = document.getElementById('setting-notes').value.trim();
      syncToMainBoard();
    }

    function syncToMainBoard() {
      try { localStorage.setItem('boardAppData', JSON.stringify(appData)); } catch (e) {}
      renderNotes();
      renderSchedule();
      updateClock();
    }

    function openSettings() {
      editingSchedule = JSON.parse(JSON.stringify(appData.schedule)); 
      document.getElementById('setting-countdown').checked = appData.settings.showCountdown;
      document.getElementById('setting-notes').value = appData.settings.teacherNotes;
      
      const modal = document.getElementById('settings-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      renderEditingSchedule();
    }

    function closeSettings() {
      const modal = document.getElementById('settings-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      resetInputFields();
    }

    function editFromMain(id) {
      openSettings();
      editEditingItem(id);
    }

    function deleteFromMain(id) {
      if (confirm('確定要從黑板上擦去這個科目嗎？')) {
        appData.schedule = appData.schedule.filter(item => item.id !== id);
        activeExamId = null; 
        syncToMainBoard();
      }
    }

    function resetInputFields() {
      document.getElementById('new-subject').value = '';
      document.getElementById('new-start').value = '';
      document.getElementById('new-end').value = '';
      
      currentEditId = null;
      const btn = document.getElementById('btn-submit-item');
      document.getElementById('submit-text').textContent = '新增';
      document.getElementById('submit-icon').className = 'ph ph-plus text-xl';
      btn.className = "col-span-2 border-2 border-[var(--chalk-green)] text-[var(--chalk-green)] hover:bg-[var(--chalk-green)] hover:text-black p-2 flex items-center gap-1 font-bold transition-all w-full md:w-auto justify-center tracking-widest rounded shadow-sm";
    }

    function addEditingItem() {
      const subjectInput = document.getElementById('new-subject');
      const startInput = document.getElementById('new-start');
      const endInput = document.getElementById('new-end');

      const subject = subjectInput.value.trim();
      const startTime = startInput.value;
      const endTime = endInput.value;

      if (subject && startTime && endTime) {
        if(startTime >= endTime) {
          alert('結束時間必須晚於開始時間喔！');
          return;
        }

        if (currentEditId) {
          const index = editingSchedule.findIndex(item => item.id === currentEditId);
          if (index !== -1) {
            editingSchedule[index] = { ...editingSchedule[index], subject, startTime, endTime };
          }
        } else {
          editingSchedule.push({
            id: Date.now().toString(),
            subject,
            startTime,
            endTime
          });
        }

        editingSchedule.sort((a, b) => a.startTime.localeCompare(b.startTime));
        
        // 即時寫入主畫面
        appData.schedule = [...editingSchedule];
        syncToMainBoard();
        
        renderEditingSchedule();
        resetInputFields(); 

        // 給予「已成功」的視覺回饋
        const btn = document.getElementById('btn-submit-item');
        document.getElementById('submit-text').textContent = '成功儲存！';
        btn.classList.add('bg-[var(--chalk-green)]', 'text-black');
        setTimeout(() => {
          document.getElementById('submit-text').textContent = '新增';
          btn.classList.remove('bg-[var(--chalk-green)]', 'text-black');
        }, 1200);

      } else {
        alert('請把黑板上的資訊填寫完整喔！');
      }
    }

    function editEditingItem(id) {
      const item = editingSchedule.find(i => i.id === id);
      if (item) {
        document.getElementById('new-subject').value = item.subject;
        document.getElementById('new-start').value = item.startTime;
        document.getElementById('new-end').value = item.endTime;
        currentEditId = id;
        
        const btn = document.getElementById('btn-submit-item');
        document.getElementById('submit-text').textContent = '更新';
        document.getElementById('submit-icon').className = 'ph ph-check text-xl';
        btn.className = "col-span-2 border-2 border-[var(--chalk-yellow)] text-[var(--chalk-yellow)] hover:bg-[var(--chalk-yellow)] hover:text-black p-2 flex items-center gap-1 font-bold transition-all w-full md:w-auto justify-center tracking-widest rounded shadow-sm";
      }
    }

    function removeEditingItem(id) {
      editingSchedule = editingSchedule.filter(item => item.id !== id);
      if (currentEditId === id) resetInputFields();
      
      // 即時寫入主畫面
      appData.schedule = [...editingSchedule];
      syncToMainBoard();
      
      renderEditingSchedule();
    }

    function init() {
      renderNotes();
      renderSchedule(); 
      updateClock();    
      setInterval(updateClock, 1000);
    }

    window.addEventListener('DOMContentLoaded', init);

  </script>
</body>
</html>
